<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCMS — Hostel Complaint Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__brand">
    <span class="topbar__mark">HC</span>
    <div>
      <p class="topbar__title">Hostel Complaint Desk</p>
      <p class="topbar__sub">Log it. Track it. Get it fixed.</p>
    </div>
  </div>
  <div class="topbar__user" id="userBadge" hidden>
    <span id="userName"></span>
    <button id="logoutBtn" class="btn btn--ghost">Log out</button>
  </div>
</header>

<!-- ============ AUTH VIEW ============ -->
<main id="authView" class="auth">
  <div class="auth__panel">
    <div class="tabs">
      <button class="tab tab--active" data-tab="login">Log in</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <form id="loginForm" class="form">
      <label>Email
        <input type="email" name="email" required placeholder="you@hostel.edu">
      </label>
      <label>Password
        <input type="password" name="password" required placeholder="••••••••">
      </label>
      <p class="form__hint">Admin demo — admin@hcms.com / admin123</p>
      <button type="submit" class="btn btn--primary">Log in</button>
      <p class="form__error" id="loginError"></p>
    </form>

    <form id="registerForm" class="form" hidden>
      <label>Full name
        <input type="text" name="full_name" required placeholder="Full name">
      </label>
      <label>Email
        <input type="email" name="email" required placeholder="you@hostel.edu">
      </label>
      <label>Password
        <input type="password" name="password" required placeholder="Choose a password">
      </label>
      <div class="form__row">
        <label>Block
          <input type="text" name="block" placeholder="e.g. B-Block">
        </label>
        <label>Room no.
          <input type="text" name="room_number" placeholder="e.g. 214">
        </label>
      </div>
      <label>Phone
        <input type="tel" name="phone" placeholder="Optional">
      </label>
      <button type="submit" class="btn btn--primary">Create account</button>
      <p class="form__error" id="registerError"></p>
    </form>
  </div>
</main>

<!-- ============ APP VIEW ============ -->
<main id="appView" class="app" hidden>

  <nav class="tabs tabs--app">
    <button class="tab tab--active" data-view="newComplaint">New complaint</button>
    <button class="tab" data-view="myComplaints">My complaints</button>
    <button class="tab tab--admin" data-view="adminBoard" hidden>Admin board</button>
    <button class="tab tab--admin" data-view="reports" hidden>Reports</button>
  </nav>

  <!-- New complaint -->
  <section id="newComplaint" class="panel">
    <h2>Raise a complaint</h2>
    <form id="complaintForm" class="form form--wide">
      <label>Title
        <input type="text" name="title" required placeholder="Short summary, e.g. Fan not working">
      </label>
      <div class="form__row">
        <label>Category
          <select name="category_id" id="categorySelect" required></select>
        </label>
        <label>Priority
          <select name="priority">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </label>
      </div>
      <div class="form__row">
        <label>Block
          <input type="text" name="block" placeholder="e.g. B-Block">
        </label>
        <label>Room no.
          <input type="text" name="room_number" placeholder="e.g. 214">
        </label>
      </div>
      <label>Description
        <textarea name="description" rows="4" required placeholder="Describe the issue in detail"></textarea>
      </label>
      <button type="submit" class="btn btn--primary">Submit complaint</button>
      <p class="form__success" id="complaintSuccess"></p>
    </form>
  </section>

  <!-- My complaints -->
  <section id="myComplaints" class="panel" hidden>
    <h2>My complaints</h2>
    <div id="myComplaintsList" class="stub-list"></div>
  </section>

  <!-- Admin board -->
  <section id="adminBoard" class="panel" hidden>
    <h2>All complaints</h2>
    <div class="filters">
      <select id="filterStatus">
        <option value="">All statuses</option>
        <option>Pending</option>
        <option>Assigned</option>
        <option>In Progress</option>
        <option>Resolved</option>
        <option>Rejected</option>
      </select>
      <button id="refreshBoard" class="btn btn--ghost">Refresh</button>
    </div>
    <div id="adminList" class="stub-list"></div>
  </section>

  <!-- Reports -->
  <section id="reports" class="panel" hidden>
    <h2>Reports & analytics</h2>
    <div id="reportSummary" class="report-grid"></div>
  </section>

</main>

<!-- Status update modal (admin) -->
<div id="statusModal" class="modal" hidden>
  <div class="modal__box">
    <h3>Update complaint #<span id="modalComplaintId"></span></h3>
    <form id="statusForm" class="form">
      <label>Status
        <select name="status" required>
          <option>Pending</option>
          <option>Assigned</option>
          <option>In Progress</option>
          <option>Resolved</option>
          <option>Rejected</option>
        </select>
      </label>
      <label>Remarks
        <textarea name="remarks" rows="3" placeholder="Optional remarks"></textarea>
      </label>
      <div class="form__row">
        <button type="submit" class="btn btn--primary">Save</button>
        <button type="button" id="modalCancel" class="btn btn--ghost">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
